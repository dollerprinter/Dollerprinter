<!DOCTYPE html>
<html>
<head>
<title>DollerPrinter Login</title>
<style>
body{font-family:Arial;text-align:center;padding-top:100px;background:#f5f5f5}
.btn{background:#ff444f;color:white;padding:15px 40px;border:none;border-radius:8px;font-size:18px;text-decoration:none;display:inline-block;margin-top:20px}
</style>
</head>
<body>
<h1>DollerPrinter Dashboard</h1>
<a class="btn" href="https://oauth.deriv.com/oauth2/authorize?app_id=1089&redirect_uri=https://dollerprinter.vercel.app/callback.html">Login with Deriv</a>
<script>
const token = localStorage.getItem('deriv_token') || localStorage.getItem('token');
const loginBtn = document.querySelector('.btn');
if(token && loginBtn) {
loginBtn.style.display = 'none';
const div = document.createElement('div');
div.innerHTML = '<h2>Welcome!</h2><p>Token: ' + token.substring(0,10) + '...</p>';
document.body.appendChild(div);
}
</script>
</body>
</html>
